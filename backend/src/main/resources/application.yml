spring:
  application:
    name: fox-procureflow-backend
  datasource:
    url: ${FOX_MYSQL_URL:jdbc:mysql://localhost:3306/fox_procureflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${FOX_MYSQL_USERNAME:fox}
    password: ${FOX_MYSQL_PASSWORD:fox}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    mongodb:
      uri: ${FOX_MONGODB_URI:mongodb://fox:fox@localhost:27017/fox_procureflow?authSource=admin}
  rabbitmq:
    host: ${FOX_RABBITMQ_HOST:localhost}
    port: ${FOX_RABBITMQ_PORT:5672}
    username: ${FOX_RABBITMQ_USERNAME:fox}
    password: ${FOX_RABBITMQ_PASSWORD:fox}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${FOX_BACKEND_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

fox:
  procureflow:
    cors:
      allowed-origins: ${FOX_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    ai:
      openai-compatible:
        enabled: ${OPENAI_COMPATIBLE_ENABLED:false}
        api-key: ${OPENAI_COMPATIBLE_API_KEY:}
        base-url: ${OPENAI_COMPATIBLE_BASE_URL:https://api.deepseek.com}
        model: ${OPENAI_COMPATIBLE_MODEL:deepseek-v4-flash}
        timeout: ${OPENAI_COMPATIBLE_TIMEOUT:30s}
    attachments:
      minio:
        endpoint: ${FOX_MINIO_ENDPOINT:http://localhost:9000}
        access-key: ${FOX_MINIO_ACCESS_KEY:fox}
        secret-key: ${FOX_MINIO_SECRET_KEY:fox-procureflow}
        rfq-bucket: ${FOX_ATTACHMENT_RFQ_BUCKET:rfq-attachments}
        receipt-invoice-bucket: ${FOX_ATTACHMENT_RECEIPT_INVOICE_BUCKET:invoice-files}
        validate-buckets-on-startup: ${FOX_ATTACHMENT_VALIDATE_BUCKETS_ON_STARTUP:false}
      max-size-bytes: ${FOX_ATTACHMENT_MAX_SIZE_BYTES:10485760}
      allowed-content-types: ${FOX_ATTACHMENT_ALLOWED_CONTENT_TYPES:application/pdf,image/jpeg,image/png,image/webp,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
